version: "3.9"

services:
  # ─── Databases ────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: nexus-timescale
    environment:
      POSTGRES_USER: ${TIMESCALE_USER:-nexus_ts}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-timescale_secret}
      POSTGRES_DB: ${TIMESCALE_DB:-nexus_timeseries}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./libs/database/src/timescale/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "psql -U ${TIMESCALE_USER:-nexus_ts} -d ${TIMESCALE_DB:-nexus_timeseries} -c 'SELECT 1' -q"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.18-community
    container_name: nexus-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-nexus_graph}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt Protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-nexus_graph}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: nexus-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka & Zookeeper ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: nexus-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nexus-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nexus-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.wifi --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.xovis --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.ipsotek --partitions 2 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.aodb --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw.fids --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic events.flow --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic events.anomaly --partitions 2 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic events.threshold --partitions 2 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic events.recommendation --partitions 1 --replication-factor 1
      echo 'Kafka topics created.'
      "

  # ─── Backend Services ─────────────────────────────────────────────
  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    container_name: nexus-api-gateway
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      TIMESCALE_URL: postgresql://${TIMESCALE_USER:-nexus_ts}:${TIMESCALE_PASSWORD:-timescale_secret}@timescaledb:5432/${TIMESCALE_DB:-nexus_timeseries}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-nexus_graph}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: 8h
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api-gateway/src:/app/src
    restart: unless-stopped

  ingestor-service:
    build:
      context: ./apps/ingestor-service
      dockerfile: Dockerfile
    container_name: nexus-ingestor
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4001
      KAFKA_BROKER: kafka:29092
      TIMESCALE_URL: postgresql://${TIMESCALE_USER:-nexus_ts}:${TIMESCALE_PASSWORD:-timescale_secret}@timescaledb:5432/${TIMESCALE_DB:-nexus_timeseries}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      CONNECTOR_MODE: ${CONNECTOR_MODE:-mock}
    ports:
      - "4001:4001"
    restart: unless-stopped

  analytics-engine:
    build:
      context: ./apps/analytics-engine
      dockerfile: Dockerfile
    container_name: nexus-analytics
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4002
      KAFKA_BROKER: kafka:29092
      TIMESCALE_URL: postgresql://${TIMESCALE_USER:-nexus_ts}:${TIMESCALE_PASSWORD:-timescale_secret}@timescaledb:5432/${TIMESCALE_DB:-nexus_timeseries}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      PROPHET_URL: http://prophet-service:8000
    ports:
      - "4002:4002"
    restart: unless-stopped

  notification-service:
    build:
      context: ./apps/notification-service
      dockerfile: Dockerfile
    container_name: nexus-notification
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4003
      KAFKA_BROKER: kafka:29092
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      API_GATEWAY_URL: http://api-gateway:4000
    ports:
      - "4003:4003"
    restart: unless-stopped

volumes:
  timescale_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_logs:
